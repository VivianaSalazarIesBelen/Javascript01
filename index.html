<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CCAA España</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h2 class="text-center mt-3">Comunidades Autónomas de España</h2>

<div class="container mt-4">

    <div class="mb-3">
        <label for="ordenar" class="form-label"><strong>Ordenar por:</strong></label>

        <select id="ordenar" class="form-select w-auto">
            <option value="nombre">Nombre (A-Z)</option>
            <option value="poblacion">Población (Mayor a menor)</option>
        </select>
    </div>

    <div class="row">


        <div class="col-md-5">

            <div class="card">

                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <span>Comunidad / Ciudad Autónoma</span>
                    <span>Población total (aprox.)</span>
                </div>


                <div id="lista-comunidades" class="list-group "></div>

            </div>
        </div>



        <div class="col-md-7">

            <div class="card p-4">

                <h3>Detalle de la Comunidad</h3>

                <form>


                    <div class="mb-3">
                        <label class="form-label">Comunidad:</label>
                        <input type="text" id="f-comunidad" class="form-control" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Capital:</label>
                        <input type="text" id="f-capital" class="form-control" readonly>
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Presidente/a:</label>
                        <input type="text" id="f-presidente" class="form-control" readonly>

                    </div>


                    <div class="mb-3">
                        <label class="form-label">Provincias:</label>
                        <textarea id="f-provincia"
                                  class="form-control"
                                  rows="5"
                                  readonly></textarea>
                    </div>


                    <button type="button"
                            id="btn-guardar"
                            class="btn btn-dark w-100">
                        Guardar cambios en el Presidente/a
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>


<script src="ccaa.js"></script>
<script src="script.js"></script>

</body>
</html>
